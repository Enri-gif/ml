<!doctype html>
<html>
    <head>
        <title>TensorFlow.js linear regression</title>
        <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
        />
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    </head>
    <header>
        <div class="section no-pad-bot" id="index-banner">
            <div class="container">
                <h5 class="header center blue-text small">Linear regression with TensorFlow.js</h5>
                <div class="row center">
                    <h6 class="header col s12 light">
                        Train a model to predict house price from living space.
                    </h6>
                </div>
            </div>
        </div>
    </header>
    <body>
        <div class="section no-pad-bot light-blue lighten-4">
            <div class="container">
                <div class="row center">
                    <button
                        id="toggle-button"
                        class="waves-effect waves-light light-blue btn-small"
                        onclick="toggleVisor()"
                    >
                        Toggle Visor
                    </button>
                    <br /><br />
                </div>
            </div>
        </div>
        <div class="container">
            <div class="section">
                <div class="row">
                    <div class="col s12 m6">
                        <div class="icon-block">
                            <h3 class="center light-blue-text">
                                <i class="material-icons" style="font-size: 2em">build</i>
                            </h3>
                            <h5 class="center">Train & Test</h5>
                            <p class="light"></p>
                            <div>
                                <p><label>Training status:</label></p>
                                <pre
                                    class="grey lighten-4"
                                    style="overflow-x: auto"
                                ><em id="model-status">Loading data...</em></pre>
                                <p><label>Testing status:</label></p>
                                <pre
                                    class="grey lighten-4"
                                    style="overflow-x: auto"
                                ><em id="testing-status">Not yet tested</em></pre>
                                <button
                                    autocomplete="off"
                                    id="train-button"
                                    class="waves-effect light-blue waves-light btn"
                                    disabled
                                    onclick="train()"
                                >
                                    Train New Model
                                </button>
                                <button
                                    autocomplete="off"
                                    id="test-button"
                                    class="waves-effect light-blue waves-light btn"
                                    disabled
                                    onclick="test()"
                                >
                                    Test Model
                                </button>
                            </div>
                            <br />
                            <div>
                                <button
                                    autocomplete="off"
                                    id="load-button"
                                    class="waves-effect light-blue waves-light btn-small"
                                    disabled
                                    onclick="load()"
                                >
                                    Load Model
                                </button>
                                <button
                                    autocomplete="off"
                                    id="save-button"
                                    class="waves-effect light-blue waves-light btn-small"
                                    disabled
                                    onclick="save()"
                                >
                                    Save Model
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="col s12 m6">
                        <div class="icon-block">
                            <h3 class="center light-blue-text">
                                <i class="material-icons" style="font-size: 2em">timeline</i>
                            </h3>
                            <h5 class="center">Predict</h5>
                            <label
                                >Square feet of living space:
                                <input type="number" id="prediction-input" placeholder="2000" />
                            </label>
                            <button
                                autocomplete="off"
                                id="predict-button"
                                class="waves-effect light-blue waves-light btn"
                                disabled
                                onclick="predict()"
                            >
                                Predict house price
                            </button>
                            <p><strong id="prediction-output"></strong></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script type="text/javascript">
            // 👇 SHARED VARIABLES - moved out of run() so all functions can access them
            let model;
            let normalisedFeature;
            let normalisedLabel;
            let trainingFeatureTensor;
            let testingFeatureTensor;
            let trainingLabelTensor;
            let testingLabelTensor;
            let points;

            async function plot(pointsArray, featureName, predictedPointsArray = null) {
                const values = [pointsArray];
                const series = ["original"];
                if (Array.isArray(predictedPointsArray)) {
                    values.push(predictedPointsArray);
                    series.push("predicted");
                }
                tfvis.render.scatterplot(
                    { name: `${featureName} vs House Price` },
                    { values, series },
                    { xLabel: featureName, yLabel: "Price" },
                );
            }
            async function plotPredictionLine() {
                const [xs, ys] = tf.tidy(() => {
                    const normalisedXs = tf.linspace(0, 1, 100);
                    const normalisedYs = model.predict(normalisedXs.reshape([100, 1]));

                    const xs = denormalise(
                        normalisedXs,
                        normalisedFeature.min,
                        normalisedFeature.max,
                    );
                    const ys = denormalise(normalisedYs, normalisedLabel.min, normalisedLabel.max);

                    return [xs.dataSync(), ys.dataSync()];
                });
                //prediction points
                const predictedPoints = Array.from(xs).map((val, i) => {
                    return { x: val, y: ys[i] };
                });
                await plot(points, "Square feet", predictedPoints);
            }
            async function plotParams(weight, params) {
                model.getLayer(null, 0).setWeights([tf.tensor2d([[weight]]), tf.tensor1d([bias])]);
                await plotPredictionLine();
                const layer = model.getLayer(undefined, 0);
                tfvis.show.layer({ name: `layer 1` }, layer);
            }
            //normalise function
            function normalise(tensor, previousMin = null, previousMax = null) {
                const min = previousMin || tensor.min();
                const max = previousMax || tensor.max();
                const normalisedTensor = tensor.sub(min).div(max.sub(min));
                return {
                    tensor: normalisedTensor,
                    min,
                    max,
                };
            }

            function denormalise(tensor, min, max) {
                return tensor.mul(max.sub(min)).add(min);
            }

            function createModel() {
                const model = tf.sequential();
                model.add(
                    tf.layers.dense({
                        inputDim: 1,
                        units: 5,
                        activation: "sigmoid",
                        useBias: true,
                    }),
                );
                model.add(
                    tf.layers.dense({
                        units: 1,
                        activation: "sigmoid",
                        useBias: true,
                    }),
                );
                const optimizer = tf.train.adam(0.1);
                model.compile({ optimizer, loss: "meanSquaredError" });
                return model;
            }

            async function trainModel(model, trainingFeatureTensor, trainingLabelTensor) {
                const { onEpochEnd } = tfvis.show.fitCallbacks({ name: "Training Performance" }, [
                    "loss",
                ]);
                return model.fit(trainingFeatureTensor, trainingLabelTensor, {
                    epochs: 20,
                    shuffle: true,
                    callbacks: {
                        onEpochEnd,
                        onEpochBegin: async function () {
                            await plotPredictionLine();
                            tfvis.show.layer({ name: `Layer 1` }, model.getLayer(undefined, 0));
                        },
                    },
                });
            }

            function testModel(model, testingFeatureTensor, testingLabelTensor) {
                const lossTensor = model.evaluate(testingFeatureTensor, testingLabelTensor);
                const loss = lossTensor.dataSync();
                console.log(`Testing Loss: ${loss}`);
            }

            async function run() {
                tfvis.visor().open();
                const houseSalesDataset = tf.data.csv("kc_house_data.csv");
                const pointsDataset = houseSalesDataset.map((record) => ({
                    x: record.sqft_living,
                    y: record.price,
                }));
                points = await pointsDataset.toArray();
                if (points.length % 2 !== 0) {
                    points.pop();
                }
                tf.util.shuffle(points);
                await plot(points, "Square feet");

                const featureValues = points.map((p) => p.x);
                const featureTensor = tf.tensor2d(featureValues, [featureValues.length, 1]);
                const labelValues = points.map((p) => p.y);
                const labelTensor = tf.tensor2d(labelValues, [labelValues.length, 1]);

                // 👇 Assign to shared variables instead of const
                normalisedFeature = normalise(featureTensor);
                normalisedLabel = normalise(labelTensor);
                [trainingFeatureTensor, testingFeatureTensor] = tf.split(
                    normalisedFeature.tensor,
                    2,
                );
                [trainingLabelTensor, testingLabelTensor] = tf.split(normalisedLabel.tensor, 2);

                document.getElementById("model-status").innerHTML = "Data loaded";
                document.getElementById("train-button").disabled = false;
                document.getElementById("load-button").disabled = false;
            }

            // 👇 NEW FUNCTIONS added here
            async function predict() {
                const predictionInput = parseInt(document.getElementById("prediction-input").value);
                if (isNaN(predictionInput)) {
                    alert("Please enter a valid number");
                    return;
                } else {
                    tf.tidy(() => {
                        const inputTensor = tf.tensor1d([predictionInput]);
                        const normalisedInput = normalise(
                            inputTensor,
                            normalisedFeature.min,
                            normalisedFeature.max,
                        );
                        const normalisedOutputTensor = model.predict(normalisedInput.tensor);
                        const outputTensor = denormalise(
                            normalisedOutputTensor,
                            normalisedLabel.min,
                            normalisedLabel.max,
                        );
                        const outputValue = outputTensor.dataSync()[0];
                        document.getElementById("prediction-output").innerHTML =
                            `the predicted house price is <br/>` +
                            `<span style="font-size: 2em">\$${(outputValue / 1000).toFixed(0) * 1000}</span>`;
                    });
                }
            }

            async function load() {
                const loadedModel = await tf.loadLayersModel("localstorage://my-model");
                const optimizer = tf.train.sgd(0.1);
                loadedModel.compile({ optimizer, loss: "meanSquaredError" });
                model = loadedModel;
                await plotPredictionLine();
                document.getElementById("model-status").innerHTML =
                    "Model loaded from local storage";
                document.getElementById("predict-button").disabled = false;
                document.getElementById("test-button").disabled = false;
            }

            async function save() {
                const saveResult = await model.save("localstorage://my-model");
                document.getElementById("model-status").innerHTML =
                    `Model saved on ${new Date().toLocaleString()}`;
            }

            async function test() {
                const lossTensor = model.evaluate(testingFeatureTensor, testingLabelTensor);
                const loss = lossTensor.dataSync();
                document.getElementById("testing-status").innerHTML = `Testing loss: ${loss}`;
            }

            async function train() {
                document.getElementById("train-button").disabled = true;
                document.getElementById("model-status").innerHTML = "Training...";
                model = createModel();
                tfvis.show.modelSummary({ name: "Model Summary", tab: "Model" }, model);
                tfvis.show.layer(
                    { name: "Layer 1", tab: "Model Inspection" },
                    model.getLayer(undefined, 0),
                );
                await trainModel(model, trainingFeatureTensor, trainingLabelTensor);
                await plotPredictionLine();
                document.getElementById("model-status").innerHTML = "Training complete";
                document.getElementById("test-button").disabled = false;
                document.getElementById("save-button").disabled = false;
                document.getElementById("predict-button").disabled = false;
                document.getElementById("train-button").disabled = false;
            }

            function toggleVisor() {
                tfvis.visor().toggle();
            }

            run();
        </script>
    </body>
</html>
